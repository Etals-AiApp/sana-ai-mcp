name: release

# Build self-contained sana-mcp binaries and publish a release. The version
# lives in package.json (single source of truth; cli.ts/mcp.ts read it).
# Triggers:
#   - push a v* tag   -> release that exact tag
#   - push to main    -> release v<package.json version>, but only if that tag
#                        doesn't exist yet (so bump "version", merge, get a release)
#   - workflow_dispatch -> release a chosen tag
# Tags containing "-" (e.g. v0.1.0-rc1) are published as prereleases.
on:
  push:
    tags: ["v*"]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and attach binaries to"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      skip: ${{ steps.r.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: r
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            tag="v$(jq -r .version package.json)"
            if git ls-remote --tags origin "refs/tags/$tag" | grep -q .; then
              echo "$tag already released; skipping"
              echo "tag=" >> "$GITHUB_OUTPUT"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "Releasing new version $tag"
              echo "tag=$tag" >> "$GITHUB_OUTPUT"
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  build:
    needs: resolve
    if: needs.resolve.outputs.skip != 'true'
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: linux-x64,     bun_target: bun-linux-x64 }
          - { target: linux-arm64,   bun_target: bun-linux-arm64 }
          - { target: darwin-x64,    bun_target: bun-darwin-x64 }
          - { target: darwin-arm64,  bun_target: bun-darwin-arm64 }
          - { target: windows-x64,   bun_target: bun-windows-x64,   ext: .exe }
          - { target: windows-arm64, bun_target: bun-windows-arm64, ext: .exe }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --no-progress
      - name: Compile
        run: |
          bun build src/cli.ts --compile \
            --target ${{ matrix.bun_target }} \
            --external @huggingface/transformers \
            --external sqlite-vec \
            --outfile sana-mcp-${{ matrix.target }}${{ matrix.ext }}
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: sana-mcp-${{ matrix.target }}${{ matrix.ext }}
          prerelease: ${{ contains(needs.resolve.outputs.tag, '-') }}
          fail_on_unmatched_files: true
